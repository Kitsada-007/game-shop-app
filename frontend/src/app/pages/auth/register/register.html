<mat-toolbar
    class="toolbar d-flex justify-content-between align-items-center px-3">
    <!-- ซ้าย: โลโก้ -->
    <div>
        <img src="assets/Images/logo.png" alt="logo" width="250px">
    </div>

    <!-- ขวา: ข้อความ + ปุ่ม -->
    <div class="d-flex flex-column align-items-end text-end me-4">
        <div class="text-white mb-2">มีบัญชีอยู่แล้ว?</div>
        <button routerLink="/login" class="btn btn-primary">เข้าสู่ระบบ</button>
    </div>
</mat-toolbar>

<h2 class="text-center text-white"
    style="margin-right: 25rem; margin-top: 5rem;">
    สร้างบัญชีของคุณ
</h2>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card-login card p-4 shadow">
                <form (ngSubmit)="onRegister()">
                    <div class="mb-3">
                        <label for="firstName" class="form-label">ชื่อ</label>
                        <input type="text" class="form-control" id="firstName"
                            [(ngModel)]="firstName" name="firstName">
                    </div>

                    <div class="mb-3">
                        <label for="lastName" class="form-label">นามสกุล</label>
                        <input type="text" class="form-control" id="lastName"
                            [(ngModel)]="lastName" name="lastName">
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">อีเมล</label>
                        <input type="email" class="form-control" id="email"
                            [(ngModel)]="email" name="email">
                    </div>

                    <div class="mb-3">
                        <label for="password"
                            class="form-label">รหัสผ่าน</label>
                        <input type="password" class="form-control"
                            id="password" [(ngModel)]="password"
                            name="password">
                    </div>

                    <div class="mb-3">
                        <label for="confirmPassword"
                            class="form-label">ยืนยันรหัสผ่าน</label>
                        <input type="password" class="form-control"
                            id="confirmPassword" name="confirmPassword">
                    </div>


                    <button type="submit"
                        class="btn btn-primary w-25 mx-auto d-block">สมัครสมาชิก</button>
                </form>
            </div>
        </div>
    </div>
</div>
