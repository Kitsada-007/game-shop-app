<app-header-admin></app-header-admin>

<div
    class="container-fluid min-vh-100 d-flex flex-column align-items-center py-5 bg-dark">
    <div class="card text-white shadow-xl mb-5 p-4 border-0"
        style="max-width: 550px; width: 100%; background-color: #1f2733; border-radius: 12px;">
        <h3 class="text-center mb-4 fw-bolder text-primary">สร้าง/แก้ไขโค้ดส่วนลด</h3>

        <form (ngSubmit)="onSubmit()" #promoForm="ngForm">

            <div class="mb-3">
                <label for="codeName"
                    class="form-label fw-semibold text-light">ชื่อโค้ดส่วนลด (CODE NAME)</label>
                <input id="codeName" type="text"
                    class="form-control bg-secondary-dark text-white border-0 rounded-pill p-3"
                    name="name" [(ngModel)]="promo.name" required placeholder="เช่น SUMMER2024" />
            </div>

            <div class="row g-3">
                <div class="col-md-6">
                    <label for="discountPrice" class="form-label fw-semibold text-light">ส่วนลด (%)</label>
                    <input id="discountPrice" type="number"
                        class="form-control bg-secondary-dark text-white border-0 rounded-pill p-3"
                        name="price" [(ngModel)]="promo.price" required min="1" max="100" />
                </div>

                <div class="col-md-6">
                    <label for="usageLimit"
                        class="form-label fw-semibold text-light">จำนวนครั้งที่ใช้ได้ (Limit)</label>
                    <input id="usageLimit" type="number"
                        class="form-control bg-secondary-dark text-white border-0 rounded-pill p-3"
                        name="limit" [(ngModel)]="promo.limit" required min="1" />
                </div>
            </div>

            <div class="d-flex justify-content-center gap-3 mt-4">
                <button type="submit"
                    class="btn btn-primary px-5 py-2 fw-bold rounded-pill text-uppercase"
                    [disabled]="promoForm.invalid">
                    {{ editingId ? 'อัปเดตโค้ด' : 'สร้างโค้ด' }}
                </button>
                <button type="button" class="btn btn-outline-secondary px-4 py-2 rounded-pill fw-bold"
                    *ngIf="editingId" (click)="cancelEdit()">
                    ยกเลิก
                </button>
            </div>
        </form>
    </div>

    <div class="card shadow-xl p-4 border-0"
        style="width: 100%; max-width: 1000px; background-color: #1f2733; border-radius: 12px;">
        <h4 class="mb-4 fw-bolder text-primary">รายการโค้ดส่วนลดทั้งหมด</h4>
        <div class="table-responsive">
            <table class="table table-dark table-hover align-middle mb-0 rounded-3 overflow-hidden">
                <thead style="background-color: #2e3642;">
                    <tr>
                        <th scope="col" class="text-uppercase text-secondary">โค้ด</th>
                        <th scope="col" class="text-uppercase text-secondary">ลด (%)</th>
                        <th scope="col" class="text-uppercase text-secondary">ใช้ได้สูงสุด</th>
                        <th scope="col" class="text-uppercase text-secondary">ใช้งานแล้ว</th>
                        <th scope="col" class="text-uppercase text-secondary">จัดการ</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let p of promos"
                        class="text-light" style="border-bottom: 1px solid #444;">
                        <td class="fw-bold text-warning">{{ p.code }}</td>
                        <td>{{ p.discount_percent }}%</td>
                        <td>{{ p.max_uses }}</td>
                        <td [class.text-danger]="p.current_uses >= p.max_uses" [class.text-success]="p.current_uses < p.max_uses">
                            {{ p.current_uses }}
                        </td>
                        <td>
                            <button class="btn btn-sm btn-outline-warning me-2 rounded-pill"
                                (click)="editPromo(p)">แก้ไข</button>
                            <button class="btn btn-sm btn-outline-danger rounded-pill"
                                (click)="deletePromo(p.id)">ลบ</button>
                        </td>
                    </tr>
                    <tr *ngIf="promos.length===0" style="border-bottom: none;">
                        <td colspan="5"
                            class="text-center text-muted py-3">ยังไม่มีโค้ดส่วนลดในระบบ ❌</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
