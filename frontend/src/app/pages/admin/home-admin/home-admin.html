<app-header-admin></app-header-admin>
<div class="container my-5 text-white">
    <div class="card mx-auto p-4 shadow-lg"
        style="max-width: 700px; background-color: rgba(23, 29, 37, 1); border: none;">
        <h4 class="text-center mb-4 fw-bold">เพิ่มเกมใหม่ๆ</h4>

        <form [formGroup]="gameForm" (ngSubmit)="submitGame()">
            <div class="mb-3">
                <label class="form-label">ชื่อเกม</label>
                <input type="text" class="form-control text-white border-0" formControlName="name">
            </div>

            <div class="mb-3">
                <label class="form-label">ราคา</label>
                <input type="number" class="form-control text-white border-0" formControlName="price">
            </div>

            <div class="mb-3">
                <label class="form-label">ประเภท</label>
                <div class="custom-select-wrapper">
                    <select style="background-color: rgba(50, 53, 60, 1);" class="form-select text-white  border-0"
                        formControlName="genre">
                        <option value disabled selected>-- เลือกประเภทเกม
                            --</option>
                        <option *ngFor="let g of genres" [value]="g">{{ g
                            }}</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">รายละเอียด</label>
                <textarea class="form-control text-white border-0" rows="4" formControlName="description"></textarea>
            </div>

            <div class="text-center mt-3">
                <button type="submit" class="btn btn-primary px-4">
                    {{ editingGameId ? 'บันทึกการแก้ไข' : 'เพิ่มเกมใหม่' }}
                </button>

                <!-- ปุ่มยกเลิก -->
                <button type="button" class="btn btn-secondary px-4 ms-2" *ngIf="editingGameId" (click)="cancelEdit()">
                    ยกเลิก
                </button>
            </div>

        </form>
    </div>
</div>

<div class="container mt-5 text-white">
    <h5 class="fw-bold mb-3">รายการเกมทั้งหมด</h5>

    <!-- แสดงสถานะโหลด -->
    <div *ngIf="loading" class="text-center my-4">
        <div class="spinner-border text-light" role="status"></div>
        <p class="mt-2">กำลังโหลดข้อมูล...</p>
    </div>

    <!-- ตารางรายการเกม -->
    <div *ngIf="!loading" class="table-responsive">
        <table class="table table-dark table-bordered align-middle text-center"
            style="background-color: #1b263b; table-layout: fixed; width: 100%;">
            <thead class="align-middle">
                <tr>
                    <th style="width: 80px;">รูป</th>
                    <th style="width: 150px;">ชื่อเกม</th>
                    <th style="width: 120px;">ประเภท</th>
                    <th style="width: 100px;">ราคา</th>
                    <th style="width: auto;">รายละเอียด</th>
                    <th style="width: 120px;">วันที่ขาย</th>
                    <th style="width: 180px;">จัดการ</th> </tr>
            </thead>

            <tbody>
                <tr *ngFor="let game of games">
                    <td>
                        <img [src]="game.images && game.images.length > 0 ? game.images[0] : 'https://via.placeholder.com/70'"
                            alt="cover" style="width:70px; height:70px; object-fit:cover; border-radius:5px;">
                    </td>

                    <td style="word-wrap: break-word;">{{ game.name }}</td>
                    <td>{{ game.genre }}</td>
                    <td>{{ game.price | number:'1.0-0' }} ฿</td>

                    <td
                        style="white-space: pre-wrap; text-align: left; word-wrap: break-word;">{{
                        game.description }}</td>

                    <td>{{ formatThaiDate(game.release_date) }}</td>

                    <td class="d-flex flex-column gap-2 align-items-center">
                        <button class="btn btn-primary btn-sm w-100"
                            (click)="editGame(game)">แก้ไข</button>
                        <button class="btn btn-danger btn-sm w-100"
                            (click)="removeGame(game)">ลบ</button>
                        <input type="file" multiple
                            (change)="onUploadImageGame($event, game.id.toString())"
                            style="display:none" #fileInput>
                        <button class="btn btn-warning btn-sm w-100"
                            (click)="fileInput.click()"
                            [disabled]="uploadingGameId === game.id.toString()">
                            <span *ngIf="uploadingGameId === game.id.toString()"
                                class="spinner-border spinner-border-sm me-2"></span>
                            อัปโหลดรูปเกม
                        </button>
                    </td>

                </tr>
            </tbody>
        </table>
    </div>
