<div class="container my-5 text-white">

    <div class="text-center mb-4">
        <h1>เพิ่มเงินไปยังวอเล็ตของคุณ</h1>
    </div>

    <div class="row justify-content-center">

        <!-- ซ้าย: ปุ่มเติมเงิน -->
        <div class="col-md-6">
            <div class="d-flex flex-column gap-3">

                <div
                    class="d-flex align-items-center justify-content-between wallet-option p-3 rounded">
                    <span>เติมเงิน 100.00</span>
                    <div class="d-flex align-items-center gap-2">
                        <span
                            class="bg-black text-white px-2 py-1 rounded">100</span>
                        <button (click)="addMoney(100)"
                            class="btn">เติมเงิน</button>
                    </div>
                </div>

                <div
                    class="d-flex align-items-center justify-content-between wallet-option p-3 rounded">
                    <span>เติมเงิน 200.00</span>
                    <div class="d-flex align-items-center gap-2">
                        <span
                            class="bg-black text-white px-2 py-1 rounded">200</span>
                        <button (click)="addMoney(200)"
                            class="btn btn-success">เติมเงิน</button>
                    </div>
                </div>

                <div
                    class="d-flex align-items-center justify-content-between wallet-option p-3 rounded">
                    <span>เติมเงิน 500.00</span>
                    <div class="d-flex align-items-center gap-2">
                        <span
                            class="bg-black text-white px-2 py-1 rounded">500</span>
                        <button (click)="addMoney(500)"
                            class="btn btn-success">เติมเงิน</button>
                    </div>
                </div>
                <div>
                    <h5>เติมเงินแบบกำหนดเอง</h5>
                </div>

                <!-- เติมเงินแบบกำหนดเอง -->
                <div class="d-flex gap-2" style="width: 50%;">
                    <input
                        type="number"
                        class="form-control"
                        [(ngModel)]="customAmount"
                        placeholder="จำนวนเงิน"
                        min="1">
                    <button
                        class="btn btn-success"
                        (click)="addMoney(customAmount)">
                        เติมเงิน
                    </button>
                </div>

            </div>
        </div>

        <!-- ขวา: ยอดวอเล็ตปัจจุบัน -->
        <div class="col-md-3">
            <div style="background-color: rgba(23, 29, 37, 1);"
                class="card text-center p-4">
                <h6 style="color: rgba(25, 153, 255, 1);">ยอดวอเล็ตปัจจุบัน</h6>
                <h3
                    style="color: rgba(25, 153, 255, 1);">{{user?.wallet_balance}}</h3>
                <!-- ใส่ยอดจริงตรงนี้ -->
            </div>
        </div>

    </div>
</div>
