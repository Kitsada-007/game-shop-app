<div class="history-container">
    <div class="tabs">
        <a routerLink="/history/buy-gram" class="active">ประวัติการซื้อเกม</a>
        <a routerLink="/history/add-monney">ประวัติการเติมเงิน</a>
    </div>
    <div class="history-table">
        <h4>จำนวนทั้งหมด {{gameHistory.length}} รายการ</h4>
        <table>
            <ng-container *ngFor="let item of gameHistory; let i = index">
                <tr>
                    <td>{{item.created_at | date:'dd/MM/yyyy HH:mm'}}</td>
                    <td style="text-align:right;">{{item.amount}} บาท</td>
                </tr>
                <tr>
                    <td colspan="2"><hr></td>
                </tr>
            </ng-container>
            <tr class="total">
                <td colspan="2" style="text-align:right;">
                    รวมจำนวนเงิน {{totalAmount}} บาท
                </td>
            </tr>
        </table>
    </div>
</div>
