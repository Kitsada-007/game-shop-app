<div class="history-container">
    <div class="tabs">
        <a routerLink="/history/buy-gram">ประวัติการซื้อเกม</a>
        <a routerLink="/history/add-monney"
            class="active">ประวัติการเติมเงิน</a>
    </div>
    <div class="history-table">
        <h4>จำนวนทั้งหมด {{moneyHistory.length}} รายการ</h4>
        <table>
            <ng-container *ngFor="let item of moneyHistory; let i = index">
                <tr>
                    <td> {{item.created_at |
                        date:'dd/MM/yyyy HH:mm'}}</td>
                    <td style="text-align:right;">{{item.amount}} บาท</td>
                </tr>
                <tr>
                    <td colspan="2"><hr></td>
                </tr>
            </ng-container>
            <tr class="total">
                <td colspan="2" style="text-align:right;">
                    รวมจำนวนเงิน {{totalAmount}} บาท
                </td>
            </tr>
        </table>

    </div>
