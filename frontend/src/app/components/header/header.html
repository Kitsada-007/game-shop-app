<mat-toolbar class="toolbar d-flex justify-content-between align-items-center px-3" color="primary">

    <!-- กลุ่มซ้าย: โลโก้ + ปุ่มลูกศร (วางแนวตั้ง) -->
    <div class="d-flex flex-column align-items-start">
        <!-- โลโก้ -->
        <img src="assets/Images/logo.png" alt="logo" width="75px" class="mb-2">

        <!-- ปุ่มลูกศร + ลิงก์ -->
        <div class="d-flex align-items-center gap-3">
            <button (click)="goBack();" mat-icon-button>
                <mat-icon
                    style="color: rgba(143, 152, 160, 1);">arrow_back</mat-icon>
            </button>
            <button (click)="goForward();" mat-icon-button>
                <mat-icon
                    style="color: rgba(143, 152, 160, 1);">arrow_forward</mat-icon>
            </button>

            <a class="text-white" routerLink style="text-decoration: none;">ร้านค้า</a>
            <a class="text-white" routerLink="/collection" style="text-decoration: none;">คลัง</a>
        </div>
    </div>

    <!-- กลุ่มขวา: User Dropdown -->
    <div class="d-flex align-items-center gap-2 me-4">
        <button mat-button [matMenuTriggerFor]="userMenu"
            style="background-color: rgba(39, 45, 55, 1); border-radius: 5px;">
            <img [src]="user?.profile_image || 'assets/Images/user.png'" alt="avatar" width="40" height="32"
                style="border-radius: 5px; margin-right: 8px;">
            <span style="color: #1e88e5; margin-right: 8px;">{{user?.username}}</span>
            <mat-icon style="color: #1e88e5;">keyboard_arrow_down</mat-icon>
        </button>

    </div>

</mat-toolbar>

<!-- Dropdown Menu -->
<mat-menu #userMenu="matMenu">
    <button mat-menu-item>

        <span routerLink="/profile">ดูโปรไฟล์ของฉัน</span>
    </button>
    <button mat-menu-item>

        <span routerLink="/wallet">ดูวอเล็ตของฉัน</span>
    </button>
    <button mat-menu-item>

        <span routerLink="history/buy-gram">ประวัติการทำรายการ</span>
    </button>
    <hr>
    <button mat-menu-item>

        <span (click)="logout()">ออกจากบัญชี</span>
    </button>
</mat-menu>

<!-- แถบค้นหา -->
<div class="d-flex justify-content-center w-100 py-2">
    <div class="d-flex align-items-center w-75" style="max-width: 900px;">

        <!-- ปุ่มหมวดหมู่ -->
        <button mat-button [matMenuTriggerFor]="CategoryMenu" class="d-flex align-items-center px-3"
            style="background-color: transparent; color: white; min-width: 120px;">
            <span style="margin-right: 8px;">หมวดหมู่</span>
            <mat-icon style="color: white;">keyboard_arrow_down</mat-icon>
        </button>

        <!-- ช่องค้นหา -->
        <div class="position-relative" style="width: 600px;">
            <input type="text" placeholder="ค้นหาในร้านค้า" class="form-control text-white border-0"
                [(ngModel)]="searchTerm" (focus)="showPopup = true" (blur)="onBlurSearch()" (input)="searchGames()" />

            <button class="btn btn-primary position-absolute end-0 top-0 h-100" (click)="searchGames()">
                <mat-icon>search</mat-icon>
            </button>

            <!-- Popup แสดงเกม -->
            <div *ngIf="showPopup && displayedGames.length > 0"
                class="position-absolute w-100 bg-dark text-white shadow"
                style="z-index: 1000; max-height: 300px; overflow-y: auto;">
                <div *ngFor="let game of displayedGames" class="d-flex align-items-center p-2 hover-bg"
                    (mousedown)="selectGame(game)">
                    <img [src]="getGameImage(game)" alt="{{game.name}}" style="width: 50px; height: 50px; object-fit: cover;" class="me-2 rounded">
                    <div>
                        <div>{{ game.name }}</div>
                        <small class="text-white">{{ game.price }}</small>
                    </div>
                </div>
            </div>
        </div>

        <!-- ปุ่มรถเข็น -->
        <button routerLink="/shopping" mat-raised-button
            style="color: aliceblue; background-color: rgba(38, 130, 255, 1); border-radius: 5px; margin-left: 8px; min-width: 90px; height: 40px;">
            รถเข็น
        </button>
    </div>
</div>

<!-- Dropdown Menu -->
<mat-menu #CategoryMenu="matMenu">
    <button (click)="goToCategory(genre)" mat-menu-item *ngFor="let genre of uniqueGenres">
        <span>{{ genre }} </span>
    </button>
</mat-menu>
<!-- content ด้านล่าง-->
